name: Test

on:
  push:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run cargo clippy
        run: cargo clippy -p ccfocus-logger -- -D warnings

  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run cargo test
        run: cargo test -p ccfocus-logger

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate --spec ccfocus/project.yml --project ccfocus/

      - name: Run Swift tests
        run: xcodebuild -project ccfocus/ccfocus.xcodeproj -scheme ccfocusTests -configuration Debug test
